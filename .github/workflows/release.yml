name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match package.json version ($PKG_VERSION). Bump package.json before tagging."
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag by listing all tags sorted by version
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since previous tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file for multi-line output
          echo "$CHANGELOG" > changelog.txt

          # Also set as output (escaped for GitHub Actions)
          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Sync manifest version to tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            if (!/^\d+\.\d+\.\d+(-[\w.+-]+)?$/.test(version)) {
              throw new Error("Refusing to write non-semver version: " + version);
            }
            const m = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
            m.version = version;
            fs.writeFileSync("manifest.json", JSON.stringify(m, null, 2) + "\n");
          '
          head -5 manifest.json

      - name: Validate manifest
        run: mcpb validate manifest.json

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Pack MCPB bundle
        id: pack
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          OUTPUT="skylight-mcp-${VERSION}.mcpb"
          mcpb pack . "${OUTPUT}"
          echo "MCPB_FILE=${OUTPUT}" >> "$GITHUB_OUTPUT"
          ls -lh "${OUTPUT}"

      - name: Publish to npm
        # TODO: revert to `npm publish --access public --provenance` once
        # Trusted Publishing on npm is confirmed working for this package.
        # The v2.0.0 bootstrap used NPM_TOKEN because the package didn't
        # exist; Trusted Publishing was later configured but still returning
        # 404 on OIDC publish attempts as of v2.0.1 — cause TBD.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Changes

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Install

            **Claude Desktop (easiest):** Download `${{ steps.pack.outputs.MCPB_FILE }}` below and double-click to install.

            **npm:** `npx @rjhalvorson/skylight-mcp`
          files: ${{ steps.pack.outputs.MCPB_FILE }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
